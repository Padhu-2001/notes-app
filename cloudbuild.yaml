steps:
  # 1. Build the container image with the v3 tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/trainocat-1773583814548/my-repo/notes-app:v3', '.']

  # 2. Push the v3 container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/trainocat-1773583814548/my-repo/notes-app:v3']

  # 3. Deploy to Cloud Run with v3 image and v3 revision name
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'notes-service'
      - '--image'
      - 'us-central1-docker.pkg.dev/trainocat-1773583814548/my-repo/notes-app:v3'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--revision-suffix'
      - 'v3'
      - '--set-env-vars'
      - 'BUCKET_NAME=${_BUCKET_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/trainocat-1773583814548/my-repo/notes-app:v3'