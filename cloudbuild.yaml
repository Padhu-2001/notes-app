steps:
  # 1. Build the container image with the v4 tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/trainocat-1773583814548/my-repo/notes-app:v4', '.']

  # 2. Push the v4 container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/trainocat-1773583814548/my-repo/notes-app:v4']

  # 3. Deploy to Cloud Run with v4 image and v4 revision name
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'notes-service'
      - '--image'
      - 'us-central1-docker.pkg.dev/trainocat-1773583814548/my-repo/notes-app:v4'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--revision-suffix'
      - 'v4'
      - '--set-env-vars'
      - 'BUCKET_NAME=${_BUCKET_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/trainocat-1773583814548/my-repo/notes-app:v4'
